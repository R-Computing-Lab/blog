baseurl: "https://r-computing-lab.github.io/blog/"
locale: "en-US"
title: "R Computing Lab"
theme: "hugo-lithium"
publishDir: "docs"
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]

permalinks:
  post: "/:year/:month/:day/:slug/"

menu:
  main:
    - name: About
      url: "/about/"
    - name: Software
      url: "/software/"
    - name: Publications
      url: "/publications/"
    - name: GitHub
      url: "https://github.com/R-Computing-Lab"
    - name: Twitter
      url: "https://twitter.com/smasongarrison"

params:
  description: "R packages, statistical genetics, and reproducible research notes from the R Computing Lab at Wake Forest University."
  highlightjsVersion: "9.12.0"
  highlightjsCDN: "//cdnjs.cloudflare.com/ajax/libs"
  highlightjsLang: ["r", "yaml"]
  highlightjsTheme: "github"
  MathJaxCDN: "//cdnjs.cloudflare.com/ajax/libs"
  MathJaxVersion: "2.7.5"
  favicon: "favicon.ico"
  logo:
    url: "logo.png"
    width: 50
    height: 50
    alt: "R Computing Lab logo"

security:
  allowContent: ['.*']

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: false
